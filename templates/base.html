<!DOCTYPE html>

<html lang="en">

<head>

    <!-- ================================= -->
    <!-- META -->
    <!-- ================================= -->

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="IPL Analytics API Platform with powerful cricket statistics and developer-friendly REST APIs."
    >

    <meta
        name="keywords"
        content="IPL API, Cricket API, IPL Analytics, Cricket Statistics API"
    >

    <meta
        name="author"
        content="IPL API Platform"
    >

    <!-- ================================= -->
    <!-- TITLE -->
    <!-- ================================= -->

    <title>

        {% block title %}

        IPL API Platform

        {% endblock %}

    </title>

    <!-- ================================= -->
    <!-- FAVICON -->
    <!-- ================================= -->

    <link
        rel="icon"
        type="image/png"
        href="{{ url_for('static', filename='images/favicon.png') }}"
    >

    <!-- ================================= -->
    <!-- BOOTSTRAP -->
    <!-- ================================= -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- ================================= -->
    <!-- BOOTSTRAP ICONS -->
    <!-- ================================= -->

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >

    <!-- ================================= -->
    <!-- GOOGLE FONTS -->
    <!-- ================================= -->

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet"
    >

    <!-- ================================= -->
    <!-- MAIN CSS -->
    <!-- ================================= -->

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}"
    >

    <!-- ================================= -->
    <!-- EXTRA HEAD -->
    <!-- ================================= -->

    {% block extra_head %}

    {% endblock %}

</head>

<body>

    <!-- ================================= -->
    <!-- GLOBAL NAVBAR -->
    <!-- ================================= -->

    {% include "partials/common/navbar.html" %}

    <!-- ================================= -->
    <!-- PAGE CONTENT -->
    <!-- ================================= -->

    <main>

        {% block content %}

        {% endblock %}

    </main>

    <!-- ================================= -->
    <!-- GLOBAL FOOTER -->
    <!-- ================================= -->
    {% if request.endpoint not in ['documentation', 'available_data', 'about'] %}

        {% include "partials/common/footer.html" %}

    {% endif %}

    <!-- ================================= -->
    <!-- BOOTSTRAP JS -->
    <!-- ================================= -->

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

    <!-- ================================= -->
    <!-- GLOBAL JS -->
    <!-- ================================= -->

    <script
        src="{{ url_for('static', filename='js/main.js') }}">
    </script>

    <!-- ================================= -->
    <!-- EXTRA SCRIPTS -->
    <!-- ================================= -->

    {% block scripts %}

    {% endblock %}

</body>

</html>
